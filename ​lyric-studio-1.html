<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LYRIC STUDIO</title>
<style>
:root{
  --bg:#0a0814;--bg2:#120f1e;--bg3:#1a1528;
  --card:#161228;--bor:rgba(180,120,255,.14);--bor2:rgba(180,120,255,.3);
  --pur:#9333ea;--pur2:#7c3aed;--pur-xl:rgba(147,51,234,.12);
  --pink:#ec4899;--pink-xl:rgba(236,72,153,.1);
  --gold:#f0b830;--gold-xl:rgba(240,184,48,.1);
  --grn:#10b981;--grn-xl:rgba(16,185,129,.1);
  --red:#ef4444;--txt:#f5f0ff;--txt2:#a090c8;--txt3:#605080;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 10%,rgba(147,51,234,.06),transparent 50%),radial-gradient(ellipse at 70% 90%,rgba(236,72,153,.04),transparent 50%);pointer-events:none;}

.hdr{background:rgba(10,8,20,.9);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--bor);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2;}
.hdr-title{font-size:16px;font-weight:900;background:linear-gradient(90deg,var(--pur),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;font-family:inherit;}

.screen{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative;z-index:1;}
.screen.show{display:flex;}

/* ===== インタビュー画面 ===== */
.interview-wrap{flex:1;overflow-y:auto;padding:20px 16px;}
.lyra-avatar{text-align:center;margin-bottom:16px;}
.lyra-ico{font-size:48px;display:block;margin-bottom:6px;}
.lyra-name{font-size:14px;font-weight:900;color:var(--pur);margin-bottom:2px;}
.lyra-title{font-size:10px;color:var(--txt3);}
.progress-bar{background:rgba(255,255,255,.08);border-radius:20px;height:6px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pur2),var(--pink));border-radius:20px;transition:width .4s;}
.question-card{background:var(--card);border:1.5px solid var(--bor2);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.q-num{font-size:9px;font-weight:700;color:var(--pur);letter-spacing:1px;margin-bottom:6px;}
.q-lyra-msg{font-size:13px;color:var(--txt);line-height:1.8;margin-bottom:14px;font-style:italic;}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.choice-btn{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:9px;text-align:center;cursor:pointer;font-size:12px;color:var(--txt2);transition:.15s;font-family:inherit;}
.choice-btn:active,.choice-btn.sel{border-color:var(--pur);background:var(--pur-xl);color:var(--txt);}
.free-inp{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:12px;font-family:inherit;outline:none;margin-top:4px;}
.free-inp:focus{border-color:var(--pur);}
.lyra-reaction{background:var(--pur-xl);border-radius:var(--r2);padding:10px 14px;font-size:12px;color:var(--pur);line-height:1.7;margin-bottom:10px;display:none;}
.next-btn{width:100%;padding:13px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--pur2),var(--pur));color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ===== 確認＋固定歌詞画面 ===== */
.confirm-wrap{flex:1;overflow-y:auto;padding:16px;}
.confirm-card{background:var(--card);border:1.5px solid var(--bor2);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.confirm-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--bor);}
.confirm-row:last-child{border-bottom:none;}
.confirm-lbl{font-size:10px;color:var(--txt3);width:80px;flex-shrink:0;padding-top:1px;}
.confirm-val{font-size:12px;color:var(--txt);flex:1;line-height:1.7;}
.section-lbl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.5px;margin-bottom:8px;}
.ta{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:12px;font-family:inherit;resize:none;outline:none;line-height:1.8;}
.ta:focus{border-color:var(--pur);}
.hint{font-size:10px;color:var(--txt3);margin-top:4px;line-height:1.6;}
.decorate-toggle{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.toggle-lbl{font-size:12px;color:var(--txt2);}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:var(--bg3);border:1.5px solid var(--bor2);position:relative;cursor:pointer;transition:.2s;}
.toggle-switch.on{background:var(--pur2);border-color:var(--pur);}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:.2s;}
.toggle-switch.on .toggle-knob{left:22px;}
.btn-row{display:flex;gap:8px;}
.btn{padding:12px;border-radius:var(--r2);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;}
.btn-ghost{background:var(--bg3);border:1.5px solid var(--bor2);color:var(--txt2);}
.btn-pur{background:linear-gradient(135deg,var(--pur2),var(--pur));color:#fff;}

/* ===== 進捗画面 ===== */
.progress-wrap{flex:1;overflow-y:auto;padding:20px 16px;}
.ai-header{text-align:center;margin-bottom:20px;}
.ai-header-ico{font-size:40px;animation:spin 2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-header-txt{font-size:14px;font-weight:700;color:var(--txt);margin-top:8px;}
.progress-steps{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r);padding:16px;}
.step-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bor);}
.step-row:last-child{border-bottom:none;}
.step-ico{font-size:16px;width:24px;text-align:center;}
.step-info{flex:1;}
.step-name{font-size:12px;font-weight:700;color:var(--txt);}
.step-detail{font-size:10px;color:var(--txt3);margin-top:2px;}
.step-status{font-size:10px;font-weight:700;}
.st-wait{color:var(--txt3);}
.st-run{color:var(--gold);animation:blink .8s infinite;}
.st-done{color:var(--grn);}
.st-fail{color:var(--red);}
@keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}
.section-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.pill{padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:var(--bg3);color:var(--txt3);}
.pill.done{background:var(--grn-xl);color:var(--grn);}
.pill.run{background:var(--gold-xl);color:var(--gold);}

/* ===== 完成画面 ===== */
.result-wrap{flex:1;overflow-y:auto;padding:16px;}
.result-header{text-align:center;background:linear-gradient(135deg,var(--pur2),var(--pink));border-radius:var(--r);padding:16px;margin-bottom:14px;}
.result-title{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;}
.result-genre{font-size:11px;color:rgba(255,255,255,.7);}
.section-block{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r2);margin-bottom:8px;overflow:hidden;}
.section-block{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r2);margin-bottom:8px;overflow:hidden;}
.section-header{background:var(--pur-xl);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.section-tag{font-size:11px;font-weight:700;color:var(--pur);}
.edit-btn{padding:3px 8px;border-radius:10px;border:1px solid var(--bor2);background:transparent;color:var(--txt3);font-size:9px;cursor:pointer;font-family:inherit;}
.section-body{padding:12px;font-size:12px;color:var(--txt);line-height:2;white-space:pre-wrap;}
.suno-card{background:var(--bg3);border:1.5px solid var(--bor2);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.suno-lbl{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:6px;}
.suno-style{font-size:11px;color:var(--txt2);line-height:1.7;}
.action-btns{display:flex;flex-direction:column;gap:8px;}
.action-btn{padding:13px;border-radius:var(--r2);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;text-align:center;}
.act-copy{background:linear-gradient(135deg,var(--pur2),var(--pur));color:#fff;}
.act-chat{background:var(--pink-xl);border:1.5px solid rgba(236,72,153,.3);color:var(--pink);}
.act-redo{background:var(--bg3);border:1.5px solid var(--bor2);color:var(--txt2);}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--pur2);color:#fff;padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">LYRIC STUDIO</div>
    <div style="font-size:9px;color:var(--txt3);">5AIが協力してあなたの歌詞を作る</div>
  </div>
  <button class="hdr-btn" onclick="resetAll()">最初から</button>
</div>

<div id="s-interview" class="screen show">
  <div class="interview-wrap">
    <div class="lyra-avatar">
      <span class="lyra-ico">🎤</span>
      <div class="lyra-name">LYRA</div>
      <div class="lyra-title">AIミュージックプロデューサー</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="q-progress" style="width:14%"></div></div>
    <div id="lyra-reaction" class="lyra-reaction"></div>
    <div class="question-card" id="question-card">
      </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の質問 →</button>
  </div>
</div>

<div id="s-confirm" class="screen">
  <div class="confirm-wrap">
    <div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:12px;text-align:center;">✅ インバビュー完了！</div>
    <div class="confirm-card" id="confirm-rows"></div>

    <div class="confirm-card">
      <div class="section-lbl">🔒 絶対に入れたいフレーズ（固定歌詞）</div>
      
      <div style="display: flex; gap: 8px;
