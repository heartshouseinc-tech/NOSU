<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MUSIC COMPOSER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<style>
:root{
  --bg:#060810;--bg2:#0e1018;--bg3:#161820;--card:#101218;
  --bor:rgba(80,160,255,.14);--bor2:rgba(80,160,255,.3);
  --blue:#3b82f6;--blue2:#2563eb;--blue-xl:rgba(59,130,246,.12);
  --cyan:#06b6d4;--cyan-xl:rgba(6,182,212,.1);
  --pur:#9333ea;--pink:#ec4899;
  --grn:#10b981;--grn-xl:rgba(16,185,129,.1);
  --gold:#f0b830;--red:#ef4444;
  --txt:#f0f4ff;--txt2:#8090b0;--txt3:#404860;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(59,130,246,.05),transparent 50%);pointer-events:none;}
.hdr{background:rgba(6,8,16,.9);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--bor);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:2;}
.hdr-title{font-size:15px;font-weight:900;background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.mode-tabs{display:flex;background:var(--bg3);border-bottom:2px solid var(--bor);flex-shrink:0;}
.mtab{flex:1;padding:10px 4px;border:none;background:none;color:var(--txt3);font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mtab .mi{font-size:18px;}
.mtab.on{color:var(--blue);border-bottom:3px solid var(--blue);margin-bottom:-2px;background:var(--blue-xl);}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.show{display:flex;}
.scroll{flex:1;overflow-y:auto;padding:14px;}
/* 共通 */
.card{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:10px;letter-spacing:.5px;}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.lbl{font-size:11px;color:var(--txt2);width:60px;flex-shrink:0;}
.inp{flex:1;padding:8px 10px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:12px;font-family:inherit;outline:none;}
.inp:focus{border-color:var(--blue);}
.sel{flex:1;padding:8px 10px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:12px;font-family:inherit;outline:none;}
.btn{padding:12px;border-radius:var(--r2);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-blue{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;}
.btn-red{background:rgba(239,68,68,.15);border:1.5px solid rgba(239,68,68,.3);color:var(--red);}
.btn-grn{background:var(--grn-xl);border:1.5px solid rgba(16,185,129,.3);color:var(--grn);}
.btn-gold{background:rgba(240,184,48,.1);border:1.5px solid rgba(240,184,48,.3);color:var(--gold);}
.btn-full{width:100%;}
.btn-row{display:flex;gap:8px;}
/* モード1：録音 */
.rec-circle{width:100px;height:100px;border-radius:50%;background:var(--bg3);border:3px solid var(--bor2);display:flex;align-items:center;justify-content:center;font-size:36px;margin:20px auto;cursor:pointer;transition:.2s;}
.rec-circle.recording{border-color:var(--red);background:rgba(239,68,68,.1);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 0 16px rgba(239,68,68,0);}}
.timer{text-align:center;font-size:28px;font-weight:900;color:var(--txt);margin-bottom:8px;font-variant-numeric:tabular-nums;}
.rec-status{text-align:center;font-size:12px;color:var(--txt2);margin-bottom:16px;}
.waveform{height:60px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);margin-bottom:12px;overflow:hidden;position:relative;}
canvas#wave-canvas{width:100%;height:100%;}
/* モード2：コード作曲 */
.chord-slots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chord-slot{width:56px;height:56px;border-radius:var(--r2);background:var(--bg3);border:2px solid var(--bor);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.chord-slot.filled{border-color:var(--blue);background:var(--blue-xl);}
.chord-name{font-size:14px;font-weight:900;color:var(--txt);}
.chord-beats{font-size:9px;color:var(--txt3);}
.chord-del{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.add-chord-btn{width:56px;height:56px;border-radius:var(--r2);background:var(--bg3);border:2px dashed var(--bor2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--txt3);cursor:pointer;}
.chord-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.cp-btn{padding:8px 4px;border-radius:6px;border:1.5px solid var(--bor);background:var(--bg3);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;}
.cp-btn:active{background:var(--blue-xl);border-color:var(--blue);color:var(--txt);}
.playhead{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.playhead-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;width:0%;transition:width .1s linear;}
/* モード3：1/fゆらぎ */
.param-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.param-lbl{font-size:11px;color:var(--txt2);width:80px;}
.param-slider{flex:1;accent-color:var(--blue);}
.param-val{font-size:11px;color:var(--blue);width:40px;text-align:right;}
.melody-preview{background:var(--bg3);border-radius:var(--r2);padding:10px;margin-bottom:10px;font-size:11px;color:var(--txt2);line-height:1.8;}
/* 録音結果 */
.result-card{background:var(--blue-xl);border:1.5px solid var(--bor2);border-radius:var(--r2);padding:12px;margin-bottom:10px;}
.result-name{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:6px;}
audio{width:100%;border-radius:var(--r2);margin-bottom:8px;}
.suno-guide{background:var(--bg3);border-radius:var(--r2);padding:10px;font-size:10px;color:var(--txt2);line-height:1.8;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--blue2);color:#fff;padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">MUSIC COMPOSER</div>
    <div style="font-size:9px;color:var(--txt3);">Suno用音源を3モードで作る</div>
  </div>
  <button onclick="showSunoGuide()" style="padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;">Sunoへ</button>
</div>

<div class="mode-tabs">
  <button class="mtab on" id="mt1" onclick="switchMode(1)"><span class="mi">🎤</span>鼻歌録音</button>
  <button class="mtab" id="mt2" onclick="switchMode(2)"><span class="mi">🎸</span>コード作曲</button>
  <button class="mtab" id="mt3" onclick="switchMode(3)"><span class="mi">🌊</span>1/fゆらぎ変換</button>
</div>

<!-- モード1：鼻歌録音 -->
<div id="m1" class="screen show">
  <div class="scroll">
    <div class="card">
      <div class="card-title">METRONOME</div>
      <div class="row">
        <div class="lbl">BPM</div>
        <input class="inp" type="number" id="m1-bpm" value="90" min="40" max="220">
        <button class="btn btn-grn" id="metro-btn" onclick="toggleMetro()" style="padding:8px 14px;">▶ 開始</button>
      </div>
      <div class="row">
        <div class="lbl">拍子</div>
        <select class="sel" id="m1-beat">
          <option value="4">4/4</option>
          <option value="3">3/4</option>
          <option value="6">6/8</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title">RECORDING</div>
      <div class="timer" id="m1-timer">00:00</div>
      <div class="rec-status" id="m1-status">ボタンを押して録音開始</div>
      <div class="waveform"><canvas id="wave-canvas"></canvas></div>
      <div class="rec-circle" id="rec-circle" onclick="toggleRecording()">🎤</div>
      <div class="btn-row">
        <button class="btn btn-blue btn-full" onclick="toggleRecording()" id="rec-btn">⏺ 録音開始</button>
      </div>
    </div>

    <div id="m1-result" style="display:none;">
      <div class="result-card">
        <div class="result-name">📁 録音完了</div>
        <audio id="m1-audio" controls></audio>
        <div class="btn-row">
          <button class="btn btn-blue" onclick="downloadAudio('m1')" style="flex:1;">📥 ダウンロード</button>
          <button class="btn btn-grn" onclick="showSunoGuide()" style="flex:1;">🚀 Sunoへ</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- モード2：コード作曲 -->
<div id="m2" class="screen">
  <div class="scroll">
    <div class="card">
      <div class="card-title">CHORD PROGRESSION</div>
      <div class="chord-slots" id="chord-slots"></div>
      <div class="card-title" style="margin-top:8px;">コードを選ぶ</div>
      <div class="chord-picker" id="chord-picker"></div>
    </div>

    <div class="card">
      <div class="card-title">SETTINGS</div>
      <div class="row"><div class="lbl">BPM</div><input class="inp" type="number" id="m2-bpm" value="90" min="40" max="220"></div>
      <div class="row"><div class="lbl">繰り返し</div><select class="sel" id="m2-repeat"><option value="2">2回</option><option value="4">4回</option><option value="8">8回</option></select></div>
      <div class="row"><div class="lbl">音色</div><select class="sel" id="m2-tone"><option value="sine">サイン波（柔らか）</option><option value="triangle">トライアングル（素朴）</option><option value="square">スクエア（電子的）</option></select></div>
    </div>

    <div class="playhead"><div class="playhead-fill" id="m2-playhead"></div></div>

    <div class="btn-row" style="margin-bottom:12px;">
      <button class="btn btn-blue" onclick="playChords()" id="m2-play-btn" style="flex:1;">▶ 再生</button>
      <button class="btn btn-red" onclick="stopChords()" style="flex:1;">⏹ 停止</button>
      <button class="btn btn-gold" onclick="recordChords()" id="m2-rec-btn" style="flex:1;">⏺ 録音</button>
    </div>

    <div class="card">
      <div class="card-title">プリセット進行</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn" style="background:var(--bg3);border:1.5px solid var(--bor);color:var(--txt2);text-align:left;padding:10px;" onclick="loadPreset(['C','Am','F','G'])">王道J-Pop: C → Am → F → G</button>
        <button class="btn" style="background:var(--bg3);border:1.5px solid var(--bor);color:var(--txt2);text-align:left;padding:10px;" onclick="loadPreset(['C','G','Am','F'])">カノン: C → G → Am → F</button>
        <button class="btn" style="background:var(--bg3);border:1.5px solid var(--bor);color:var(--txt2);text-align:left;padding:10px;" onclick="loadPreset(['Am','F','C','G'])">Aマイナー王道: Am → F → C → G</button>
        <button class="btn" style="background:var(--bg3);border:1.5px solid var(--bor);color:var(--txt2);text-align:left;padding:10px;" onclick="loadPreset(['Dm','G','C','C'])">小室進行: Dm → G → C → C</button>
        <button class="btn" style="background:var(--bg3);border:1.5px solid var(--bor);color:var(--txt2);text-align:left;padding:10px;" onclick="loadPreset(['Am','G','F','E'])">クリシェ: Am → G → F → E</button>
      </div>
    </div>

    <div id="m2-result" style="display:none;">
      <div class="result-card">
        <div class="result-name">📁 録音完了</div>
        <audio id="m2-audio" controls></audio>
        <div class="btn-row">
          <button class="btn btn-blue" onclick="downloadAudio('m2')" style="flex:1;">📥 ダウンロード</button>
          <button class="btn btn-grn" onclick="showSunoGuide()" style="flex:1;">🚀 Sunoへ</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- モード3：1/fゆらぎ変換 -->
<div id="m3" class="screen">
  <div class="scroll">
    <div class="card">
      <div class="card-title">コード進行（モード2から引き継ぎ）</div>
      <div id="m3-chords" style="font-size:13px;color:var(--txt);margin-bottom:8px;">コード未設定</div>
      <div class="row"><div class="lbl">BPM</div><input class="inp" type="number" id="m3-bpm" value="90" min="40" max="220"></div>
      <div class="row"><div class="lbl">小節数</div><select class="sel" id="m3-bars"><option value="4">4小節</option><option value="8">8小節</option><option value="16">16小節</option></select></div>
    </div>

    <div class="card">
      <div class="card-title">1/f ゆらぎ パラメータ</div>
      <div class="param-row">
        <div class="param-lbl">ピッチゆらぎ</div>
        <input type="range" class="param-slider" id="p-pitch" min="0" max="30" value="12" oninput="updateParam('pitch',this.value)">
        <div class="param-val" id="pv-pitch">12¢</div>
      </div>
      <div class="param-row">
        <div class="param-lbl">タイミング</div>
        <input type="range" class="param-slider" id="p-timing" min="0" max="60" value="25" oninput="updateParam('timing',this.value)">
        <div class="param-val" id="pv-timing">25ms</div>
      </div>
      <div class="param-row">
        <div class="param-lbl">音量ゆらぎ</div>
        <input type="range" class="param-slider" id="p-vol" min="0" max="20" value="8" oninput="updateParam('vol',this.value)">
        <div class="param-val" id="pv-vol">8%</div>
      </div>
      <div class="param-row">
        <div class="param-lbl">音の長さ</div>
        <select class="sel" id="p-notelen">
          <option value="4">4分音符</option>
          <option value="8">8分音符</option>
          <option value="2">2分音符</option>
        </select>
      </div>
      <div style="font-size:9px;color:var(--txt3);margin-top:4px;">ゆらぎが大きいほど人間っぽい。小さいほど機械的。</div>
    </div>

    <div class="card">
      <div class="card-title">生成プレビュー</div>
      <div class="melody-preview" id="m3-preview">コード進行を設定して「生成」を押してください</div>
    </div>

    <div class="btn-row" style="margin-bottom:12px;">
      <button class="btn btn-blue" onclick="generateHum()" style="flex:1;">🌊 生成・再生</button>
      <button class="btn btn-red" onclick="stopHum()" style="flex:1;">⏹ 停止</button>
      <button class="btn btn-gold" onclick="recordHum()" id="m3-rec-btn" style="flex:1;">⏺ 録音</button>
    </div>

    <div id="m3-result" style="display:none;">
      <div class="result-card">
        <div class="result-name">📁 1/fゆらぎ音源</div>
        <audio id="m3-audio" controls></audio>
        <div class="btn-row">
          <button class="btn btn-blue" onclick="downloadAudio('m3')" style="flex:1;">📥 ダウンロード</button>
          <button class="btn btn-grn" onclick="showSunoGuide()" style="flex:1;">🚀 Sunoへ</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var audioCtx=null;
var mediaRec=null;
var recChunks=[];
var isRecording=false;
var metroInterval=null;
var metroPlaying=false;
var metroCount=0;
var recTimer=null;
var recSeconds=0;
var m2IsPlaying=false;
var m2Timeout=[];
var m2RecordMode=false;
var m2Blob=null;
var m3Blob=null;
var m1Blob=null;
var humTimeout=[];
var humPlaying=false;
var humRecording=false;

// コード→周波数マップ
var CHORD_NOTES={
  'C':[261.63,329.63,392.00],'Cm':[261.63,311.13,392.00],
  'D':[293.66,369.99,440.00],'Dm':[293.66,349.23,440.00],
  'E':[329.63,415.30,493.88],'Em':[329.63,392.00,493.88],
  'F':[349.23,440.00,523.25],'Fm':[349.23,415.30,523.25],
  'G':[392.00,493.88,587.33],'Gm':[392.00,466.16,587.33],
  'A':[440.00,554.37,659.25],'Am':[440.00,523.25,659.25],
  'B':[493.88,622.25,739.99],'Bm':[493.88,587.33,739.99],
  'C7':[261.63,329.63,392.00,466.16],'G7':[392.00,493.88,587.33,698.46],
  'F7':[349.23,440.00,523.25,622.25],'A7':[440.00,554.37,659.25,783.99],
  'Bb':[233.08,293.66,349.23],'Ab':[207.65,261.63,311.13]
};
var ALL_CHORDS=['C','Cm','D','Dm','E','Em','F','Fm','G','Gm','A','Am','B','Bm','C7','G7','Bb','Ab'];
var chordProgress=['C','Am','F','G'];

function getCtx(){if(!audioCtx||audioCtx.state==='closed')audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}

function switchMode(n){
  for(var i=1;i<=3;i++){
    document.getElementById('m'+i).classList.toggle('show',i===n);
    document.getElementById('mt'+i).classList.toggle('on',i===n);
  }
  if(n===3) updateM3Chords();
}

// === モード1：録音 ===
function toggleMetro(){
  if(metroPlaying){
    clearInterval(metroInterval);metroPlaying=false;
    document.getElementById('metro-btn').textContent='▶ 開始';
    document.getElementById('metro-btn').className='btn btn-grn';
  } else {
    metroPlaying=true;metroCount=0;
    document.getElementById('metro-btn').textContent='⏹ 停止';
    document.getElementById('metro-btn').className='btn btn-red';
    var bpm=parseInt(document.getElementById('m1-bpm').value)||90;
    var interval=60000/bpm;
    var ctx=getCtx();
    function tick(){
      var o=ctx.createOscillator();var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=metroCount%parseInt(document.getElementById('m1-beat').value)===0?880:440;
      g.gain.setValueAtTime(.5,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.05);
      o.start();o.stop(ctx.currentTime+.05);
      metroCount++;
    }
    tick();metroInterval=setInterval(tick,interval);
  }
}

async function toggleRecording(){
  if(isRecording){stopRecording();}
  else{await startRecording();}
}

async function startRecording(){
  try{
    var stream=await navigator.mediaDevices.getUserMedia({audio:true});
    var ctx=getCtx();
    var src=ctx.createMediaStreamSource(stream);
    var analyser=ctx.createAnalyser();analyser.fftSize=256;
    src.connect(analyser);
    var canvas=document.getElementById('wave-canvas');
    var cCtx=canvas.getContext('2d');
    canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
    function draw(){
      if(!isRecording)return;
      requestAnimationFrame(draw);
      var data=new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteTimeDomainData(data);
      cCtx.fillStyle='#161820';cCtx.fillRect(0,0,canvas.width,canvas.height);
      cCtx.lineWidth=2;cCtx.strokeStyle='#3b82f6';cCtx.beginPath();
      var sw=canvas.width/data.length;
      for(var i=0;i<data.length;i++){var y=(data[i]/128)*canvas.height/2;if(i===0)cCtx.moveTo(i*sw,y);else cCtx.lineTo(i*sw,y);}
      cCtx.stroke();
    }
    mediaRec=new MediaRecorder(stream);recChunks=[];
    mediaRec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data);};
    mediaRec.onstop=function(){
      var blob=new Blob(recChunks,{type:'audio/webm'});
      m1Blob=blob;
      var url=URL.createObjectURL(blob);
      document.getElementById('m1-audio').src=url;
      document.getElementById('m1-result').style.display='block';
      stream.getTracks().forEach(function(t){t.stop();});
    };
    mediaRec.start();isRecording=true;recSeconds=0;
    draw();
    document.getElementById('rec-circle').classList.add('recording');
    document.getElementById('rec-circle').textContent='⏹';
    document.getElementById('rec-btn').textContent='⏹ 録音停止';
    document.getElementById('m1-status').textContent='録音中...';
    recTimer=setInterval(function(){
      recSeconds++;
      var m=Math.floor(recSeconds/60);var s=recSeconds%60;
      document.getElementById('m1-timer').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    },1000);
  }catch(e){showToast('マイクへのアクセスが必要です');}
}

function stopRecording(){
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  isRecording=false;clearInterval(recTimer);
  document.getElementById('rec-circle').classList.remove('recording');
  document.getElementById('rec-circle').textContent='🎤';
  document.getElementById('rec-btn').textContent='⏺ 録音開始';
  document.getElementById('m1-status').textContent='録音完了！';
}

// === モード2：コード作曲 ===
function renderChordSlots(){
  var html='';
  chordProgress.forEach(function(c,i){
    html+='<div class="chord-slot filled">'
      +'<div class="chord-name">'+esc(c)+'</div>'
      +'<div class="chord-beats">1小節</div>'
      +'<div class="chord-del" onclick="removeChord('+i+')">×</div></div>';
  });
  html+='<div class="add-chord-btn" onclick="document.getElementById(\'chord-picker\').style.display=\'grid\'">＋</div>';
  document.getElementById('chord-slots').innerHTML=html;
  updateM3Chords();
}

function renderChordPicker(){
  document.getElementById('chord-picker').innerHTML=ALL_CHORDS.map(function(c){
    return '<button class="cp-btn" onclick="addChord(\''+c+'\')">'+esc(c)+'</button>';
  }).join('');
}

function addChord(c){chordProgress.push(c);renderChordSlots();document.getElementById('chord-picker').style.display='none';}
function removeChord(i){chordProgress.splice(i,1);renderChordSlots();}
function loadPreset(chords){chordProgress=chords.slice();renderChordSlots();showToast('プリセットを読み込みました');}

function playChord(ctx,chord,startTime,dur,type,vol){
  var notes=CHORD_NOTES[chord]||CHORD_NOTES['C'];
  notes.forEach(function(freq){
    var o=ctx.createOscillator();var g=ctx.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,startTime);
    g.gain.linearRampToValueAtTime(vol||0.15,startTime+0.02);
    g.gain.linearRampToValueAtTime(vol||0.15,startTime+dur-0.05);
    g.gain.linearRampToValueAtTime(0,startTime+dur);
    o.connect(g);g.connect(ctx.destination);
    o.start(startTime);o.stop(startTime+dur);
  });
}

function playChords(){
  if(m2IsPlaying){stopChords();return;}
  if(!chordProgress.length){showToast('コードを追加してください');return;}
  m2IsPlaying=true;
  var ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  var bpm=parseInt(document.getElementById('m2-bpm').value)||90;
  var repeat=parseInt(document.getElementById('m2-repeat').value)||2;
  var type=document.getElementById('m2-tone').value;
  var secsPerBar=(60/bpm)*4;
  var totalBars=chordProgress.length*repeat;
  var startTime=ctx.currentTime+0.05;
  for(var r=0;r<repeat;r++){
    chordProgress.forEach(function(c,i){
      var t=startTime+(r*chordProgress.length+i)*secsPerBar;
      playChord(ctx,c,t,secsPerBar,type,0.12);
    });
  }
  var totalTime=totalBars*secsPerBar*1000;
  var startMs=Date.now();
  var ph=document.getElementById('m2-playhead');
  var phInt=setInterval(function(){
    var pct=Math.min(100,((Date.now()-startMs)/totalTime)*100);
    ph.style.width=pct+'%';
    if(pct>=100){clearInterval(phInt);ph.style.width='0%';}
  },100);
  var t2=setTimeout(function(){m2IsPlaying=false;document.getElementById('m2-play-btn').textContent='▶ 再生';},totalTime+200);
  m2Timeout.push(t2,phInt);
  document.getElementById('m2-play-btn').textContent='⏸ 停止';
}

function stopChords(){
  m2IsPlaying=false;m2Timeout.forEach(function(t){clearTimeout(t);clearInterval(t);});m2Timeout=[];
  document.getElementById('m2-play-btn').textContent='▶ 再生';
  document.getElementById('m2-playhead').style.width='0%';
  if(audioCtx)audioCtx.close().then(function(){audioCtx=null;});
}

async function recordChords(){
  if(!chordProgress.length){showToast('コードを追加してください');return;}
  var ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  var dest=ctx.createMediaStreamDestination();
  var bpm=parseInt(document.getElementById('m2-bpm').value)||90;
  var repeat=parseInt(document.getElementById('m2-repeat').value)||2;
  var type=document.getElementById('m2-tone').value;
  var secsPerBar=(60/bpm)*4;
  var totalBars=chordProgress.length*repeat;
  var startTime=ctx.currentTime+0.05;
  for(var r=0;r<repeat;r++){
    chordProgress.forEach(function(c,i){
      var t=startTime+(r*chordProgress.length+i)*secsPerBar;
      var notes=CHORD_NOTES[c]||CHORD_NOTES['C'];
      notes.forEach(function(freq){
        var o=ctx.createOscillator();var g=ctx.createGain();
        o.type=type;o.frequency.value=freq;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.15,t+.02);
        g.gain.linearRampToValueAtTime(.15,t+secsPerBar-.05);g.gain.linearRampToValueAtTime(0,t+secsPerBar);
        o.connect(g);g.connect(dest);o.start(t);o.stop(t+secsPerBar);
      });
    });
  }
  var rec=new MediaRecorder(dest.stream);var chunks=[];
  rec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
  rec.onstop=function(){
    m2Blob=new Blob(chunks,{type:'audio/webm'});
    document.getElementById('m2-audio').src=URL.createObjectURL(m2Blob);
    document.getElementById('m2-result').style.display='block';
    showToast('録音完了！');
  };
  rec.start();
  document.getElementById('m2-rec-btn').textContent='録音中...';
  setTimeout(function(){rec.stop();document.getElementById('m2-rec-btn').textContent='⏺ 録音';},totalBars*secsPerBar*1000+500);
}

// === モード3：1/fゆらぎ ===
function updateParam(type,val){
  var units={pitch:'¢',timing:'ms',vol:'%'};
  document.getElementById('pv-'+type).textContent=val+(units[type]||'');
}
function updateM3Chords(){
  var el=document.getElementById('m3-chords');
  if(el) el.textContent=chordProgress.length?chordProgress.join(' → '):'コード未設定';
}

// ピンクノイズ（1/f）生成器
function PinkNoise(){var b=[0,0,0,0,0,0,0];this.next=function(){var w=(Math.random()*2-1);b[0]=.99886*b[0]+w*.0555179;b[1]=.99332*b[1]+w*.0750759;b[2]=.96900*b[2]+w*.1538520;b[3]=.86650*b[3]+w*.3104856;b[4]=.55000*b[4]+w*.5329522;b[5]=-.7616*b[5]-w*.0168980;var p=b[0]+b[1]+b[2]+b[3]+b[4]+b[5]+b[6]+w*.5362;b[6]=w*.115926;return p*.11;};}

async function generateHum(){
  if(!chordProgress.length){showToast('コードを追加してください');return;}
  var ctx=getCtx();if(ctx.state==='suspended')ctx.resume();
  var bpm=parseInt(document.getElementById('m3-bpm').value)||90;
  var bars=parseInt(document.getElementById('m3-bars').value)||8;
  var pitchCent=parseInt(document.getElementById('p-pitch').value)||12;
  var timingMs=parseInt(document.getElementById('p-timing').value)||25;
  var volPct=parseInt(document.getElementById('p-vol').value)||8;
  var notelen=parseInt(document.getElementById('p-notelen').value)||4;
  var secPerBeat=60/bpm;
  var secPerNote=secPerBeat*(4/notelen);
  var pink=new PinkNoise();
  var totalNotes=bars*notelen;
  var preview=[];
  humTimeout.forEach(function(t){clearTimeout(t);});humTimeout=[];
  humPlaying=true;
  var startTime=ctx.currentTime+0.1;
  for(var i=0;i<totalNotes;i++){
    var chordIdx=Math.floor((i/notelen)%chordProgress.length);
    var chord=chordProgress[chordIdx];
    var notes=CHORD_NOTES[chord]||CHORD_NOTES['C'];
    var melodyNote=notes[i%3];
    // 1/fゆらぎ適用
    var pinkVal=pink.next();
    var pitchMult=Math.pow(2,(pinkVal*pitchCent)/1200);
    var timingOffset=(pinkVal*timingMs)/1000;
    var volMult=1+(pinkVal*(volPct/100));
    var t=startTime+i*secPerNote+timingOffset;
    var freq=melodyNote*pitchMult;
    var vol=Math.max(0.01,Math.min(0.3,0.18*volMult));
    (function(freq,t,dur,vol){
      var o=ctx.createOscillator();var g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.03);
      g.gain.linearRampToValueAtTime(vol*0.7,t+dur*0.6);
      g.gain.linearRampToValueAtTime(0,t+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(t);o.stop(t+dur);
    })(freq,t,secPerNote*0.85,vol);
    preview.push(chord+'('+(melodyNote*pitchMult).toFixed(0)+'Hz)');
  }
  document.getElementById('m3-preview').textContent='生成中: '+preview.slice(0,12).join(' ')+'...';
  var totalDuration=totalNotes*secPerNote;
  var t2=setTimeout(function(){humPlaying=false;document.getElementById('m3-preview').textContent='再生完了';},totalDuration*1000+500);
  humTimeout.push(t2);
  showToast('1/fゆらぎで再生中');
}

function stopHum(){
  humPlaying=false;humTimeout.forEach(function(t){clearTimeout(t);});humTimeout=[];
  if(audioCtx)audioCtx.close().then(function(){audioCtx=null;});
  showToast('停止しました');
}

function downloadAudio(mode){
  var blob=mode==='m1'?m1Blob:mode==='m2'?m2Blob:m3Blob;
  if(!blob){showToast('録音データがありません');return;}
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='suno_audio_'+mode+'_'+Date.now()+'.webm';a.click();
  showToast('ダウンロード開始');
}
