<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MUSIC RESEARCH</title>
<style>
:root{
  --bg:#0d0b14;--bg2:#13101e;--bg3:#1a1628;
  --card:#1a1628;--bor:rgba(160,120,255,.12);--bor2:rgba(160,120,255,.25);
  --pur:#7c3aed;--pur2:#a855f7;--pur-xl:rgba(124,58,237,.12);
  --gold:#f0b830;--gold2:#d4960a;--gold-xl:rgba(240,184,48,.1);
  --grn:#10b981;--grn-xl:rgba(16,185,129,.1);
  --red:#ef4444;--txt:#f0eeff;--txt2:#a090c8;--txt3:#605080;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bor);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:16px;font-weight:900;background:linear-gradient(90deg,var(--gold),var(--pur2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;gap:6px;}
.nav-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-decoration:none;display:flex;align-items:center;}
.main{padding:14px;max-width:600px;margin:0 auto;}
.card{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.card-lbl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.5px;margin-bottom:8px;}
.search-topic{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.15s;}
.search-topic:active{background:var(--pur-xl);}
.topic-name{font-size:12px;font-weight:700;color:var(--txt);}
.topic-q{font-size:10px;color:var(--txt3);margin-top:2px;}
.topic-status{font-size:10px;padding:3px 8px;border-radius:20px;}
.ts-done{background:var(--grn-xl);color:var(--grn);}
.ts-none{background:rgba(255,255,255,.05);color:var(--txt3);}
.btn{padding:11px 16px;border-radius:var(--r2);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;}
.btn-pur{background:linear-gradient(135deg,var(--pur),var(--pur2));color:#fff;}
.btn-ghost{background:var(--bg3);border:1.5px solid var(--bor2);color:var(--txt2);}
.btn-full{width:100%;}
.btn-row{display:flex;gap:8px;}
.result-box{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:12px;font-size:11px;color:var(--txt2);line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-top:8px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat-card{background:var(--bg3);border-radius:var(--r2);padding:10px;text-align:center;}
.stat-num{font-size:22px;font-weight:900;color:var(--gold);}
.stat-lbl{font-size:9px;color:var(--txt3);margin-top:2px;}
.progress-wrap{margin-bottom:10px;display:none;}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--pur),var(--pur2));border-radius:2px;transition:width .4s;}
.progress-txt{font-size:10px;color:var(--pur2);margin-top:4px;text-align:center;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
.collected-item{background:var(--bg3);border-radius:var(--r2);padding:10px;margin-bottom:6px;}
.ci-cat{font-size:9px;color:var(--pur2);font-weight:700;margin-bottom:4px;}
.ci-txt{font-size:11px;color:var(--txt2);line-height:1.7;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">🔭 MUSIC RESEARCH</div>
    <div style="font-size:9px;color:var(--txt3);">音楽理論・Suno攻略を自動収集</div>
  </div>
  <div class="nav-links">
    <a class="nav-btn" href="music-logic.html">📚</a>
    <a class="nav-btn" href="music-chat.html">💬</a>
    <a class="nav-btn" href="suno-craft.html">⚡</a>
  </div>
</div>

<div class="main">
  <!-- 統計 -->
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="st-chords">0</div><div class="stat-lbl">コード進行</div></div>
    <div class="stat-card"><div class="stat-num" id="st-genres">0</div><div class="stat-lbl">ジャンル法則</div></div>
    <div class="stat-card"><div class="stat-num" id="st-research">0</div><div class="stat-lbl">収集データ</div></div>
    <div class="stat-card"><div class="stat-num" id="st-prompts">0</div><div class="stat-lbl">成功プロンプト</div></div>
  </div>

  <!-- 一括収集 -->
  <div class="card">
    <div class="card-lbl">🚀 一括自動収集</div>
    <p style="font-size:11px;color:var(--txt2);line-height:1.7;margin-bottom:10px;">
      音楽理論・コード進行・Suno攻略情報をGoogle検索で自動収集します。
      全カテゴリを順番に検索して保存します。
    </p>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-txt" id="progress-txt">準備中...</div>
    </div>
    <button class="btn btn-gold btn-full" id="collect-all-btn" onclick="collectAll()">
      🔭 全カテゴリを収集する（約2〜3分）
    </button>
  </div>

  <!-- トピック別収集 -->
  <div class="card">
    <div class="card-lbl">テーマ別収集（個別実行）</div>
    <div id="topic-list"></div>
  </div>

  <!-- 収集済みデータ -->
  <div class="card">
    <div class="card-lbl">収集済みデータ</div>
    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn btn-ghost" onclick="showCollected()" style="flex:1;font-size:11px;">表示</button>
      <button class="btn btn-ghost" onclick="clearResearch()" style="flex:1;font-size:11px;color:var(--red);">全削除</button>
    </div>
    <div id="collected-area"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const EP='https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
const KEY='HeartsHouse2026Key';

// ══ 収集トピック定義 ══
const TOPICS=[
  {id:'chord_jpop',cat:'コード進行',name:'J-Popコード進行',
   query:'J-Pop 人気コード進行 王道進行 小室進行 カノン進行 Suno AI 使い方 2024'},
  {id:'chord_anime',cat:'コード進行',name:'アニソン・ボカロコード進行',
   query:'アニソン ボカロ コード進行 法則 特徴 神曲 パターン'},
  {id:'chord_citypop',cat:'コード進行',name:'シティポップコード進行',
   query:'シティポップ コード進行 特徴 maj7 テンションコード 80年代'},
  {id:'chord_metal',cat:'コード進行',name:'ロック・メタルコード',
   query:'ロック メタル コード進行 パワーコード 特徴 激しい曲 作り方'},
  {id:'suno_style',cat:'Suno攻略',name:'Sunoスタイル指定の法則',
   query:'Suno AI Style 指定 コツ 成功 プロンプト 2024 日本語'},
  {id:'suno_lyric',cat:'Suno攻略',name:'Suno歌詞メタタグ',
   query:'Suno AI 歌詞 メタタグ Chorus Verse Bridge Silence 使い方 コツ'},
  {id:'suno_genre',cat:'Suno攻略',name:'Sunoジャンル別成功パターン',
   query:'Suno AI J-Pop アニソン シティポップ 成功 プロンプト例 ジャンル'},
  {id:'theory_basic',cat:'音楽理論',name:'基本音楽理論',
   query:'音楽理論 基礎 コード 音程 調 BPM 作曲 初心者'},
  {id:'theory_melody',cat:'音楽理論',name:'メロディ作成の法則',
   query:'メロディ 作り方 法則 キャッチー 耳に残る 作曲 コツ'},
  {id:'theory_structure',cat:'音楽理論',name:'曲構成の法則',
   query:'曲 構成 AメロBメロサビ イントロ アウトロ 法則 J-Pop'},
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}

async function callAI(prompt,search){
  var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','X-Access-Key':KEY},
    body:JSON.stringify({model:'gemini-2.5-flash',prompt:prompt,useSearch:!!search})});
  var d=await r.json().catch(()=>({}));
  return d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'';
}

// ══ localStorage 管理 ══
function getDB(key){try{return JSON.parse(localStorage.getItem(key)||'[]');}catch{return[];}}
function setDB(key,data){localStorage.setItem(key,JSON.stringify(data));}
function addToDB(key,item){var db=getDB(key);db.push(item);setDB(key,db);}

function updateStats(){
  document.getElementById('st-chords').textContent=getDB('mc_chords').length;
  document.getElementById('st-genres').textContent=getDB('mc_genres').length;
  document.getElementById('st-research').textContent=getDB('mc_research').length;
  document.getElementById('st-prompts').textContent=getDB('mc_prompts').length;
}

// ══ トピックリスト描画 ══
function renderTopics(){
  var research=getDB('mc_research');
  var collectedIds=research.map(r=>r.topicId);
  var html=TOPICS.map(function(t){
    var done=collectedIds.includes(t.id);
    return '<div class="search-topic" onclick="collectTopic(\''+t.id+'\')">'
      +'<div><div class="topic-name">'+esc(t.name)+'</div>'
      +'<div class="topic-q">'+esc(t.query.slice(0,40))+'...</div></div>'
      +'<div class="topic-status '+(done?'ts-done':'ts-none')+'">'+(done?'✅ 収集済':'未収集')+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('topic-list').innerHTML=html;
}

// ══ 個別収集 ══
async function collectTopic(id){
  var topic=TOPICS.find(t=>t.id===id);
  if(!topic) return;
  showToast('🔭 「'+topic.name+'」を収集中...');

  var prompt='以下のテーマについて詳しく教えてください。\n\n'
    +'テーマ：'+topic.query+'\n\n'
    +'【出力形式】\n'
    +'・箇条書きで5〜10項目\n'
    +'・各項目は具体的な数値・例を含める\n'
    +'・Sunoプロンプトに直接使える形で記述\n'
    +'・日本語で出力';

  try{
    var txt=await callAI(prompt,true);
    var item={
      topicId:topic.id,
      cat:topic.cat,
      name:topic.name,
      content:txt,
      collectedAt:new Date().toLocaleString('ja-JP')
    };
    // 既存データを更新or追加
    var db=getDB('mc_research');
    var idx=db.findIndex(r=>r.topicId===id);
    if(idx>=0) db[idx]=item; else db.push(item);
    setDB('mc_research',db);

    // カテゴリ別に整理して保存
    organizeToCategory(item);
    updateStats();
    renderTopics();
    showToast('✅ 「'+topic.name+'」を収集しました');
  }catch(e){showToast('❌ エラー: '+e.message);}
}

function organizeToCategory(item){
  if(item.cat==='コード進行'){
    var db=getDB('mc_chords');
    // 既存の同カテゴリを更新
    var idx=db.findIndex(c=>c.source===item.topicId);
    var entry={source:item.topicId,name:item.name,content:item.content,updatedAt:item.collectedAt};
    if(idx>=0) db[idx]=entry; else db.push(entry);
    setDB('mc_chords',db);
  } else if(item.cat==='音楽理論'){
    var db2=getDB('mc_genres');
    var idx2=db2.findIndex(g=>g.source===item.topicId);
    var entry2={source:item.topicId,name:item.name,content:item.content,updatedAt:item.collectedAt};
    if(idx2>=0) db2[idx2]=entry2; else db2.push(entry2);
    setDB('mc_genres',db2);
  }
  // Suno攻略はmc_researchにそのまま保持
}

// ══ 一括収集 ══
async function collectAll(){
  var btn=document.getElementById('collect-all-btn');
  btn.disabled=true;btn.textContent='収集中...';
  var wrap=document.getElementById('progress-wrap');
  wrap.style.display='block';
  var fill=document.getElementById('progress-fill');
  var ptxt=document.getElementById('progress-txt');

  for(var i=0;i<TOPICS.length;i++){
    var t=TOPICS[i];
    var pct=Math.round((i/TOPICS.length)*100);
    fill.style.width=pct+'%';
    ptxt.textContent='('+(i+1)+'/'+TOPICS.length+') 「'+t.name+'」を収集中...';
    await collectTopic(t.id);
    await new Promise(r=>setTimeout(r,500)); // 過負荷防止
  }

  fill.style.width='100%';
  ptxt.textContent='✅ 全カテゴリの収集が完了しました！';
  setTimeout(()=>{wrap.style.display='none';},3000);
  btn.disabled=false;btn.textContent='🔭 全カテゴリを収集する（約2〜3分）';
  showToast('✅ 全'+TOPICS.length+'カテゴリを収集しました');
}

// ══ 収集データ表示 ══
function showCollected(){
  var db=getDB('mc_research');
  if(!db.length){document.getElementById('collected-area').innerHTML='<div style="font-size:11px;color:var(--txt3);">まだデータがありません</div>';return;}
  document.getElementById('collected-area').innerHTML=db.map(function(item){
    return '<div class="collected-item">'
      +'<div class="ci-cat">'+esc(item.cat)+' — '+esc(item.name)+'　<span style="color:var(--txt3);font-size:9px;">'+esc(item.collectedAt)+'</span></div>'
      +'<div class="ci-txt">'+esc(item.content.slice(0,150))+'...</div>'
      +'</div>';
  }).join('');
}

function clearResearch(){
  if(!confirm('収集データを全削除しますか？'))return;
  ['mc_research','mc_chords','mc_genres'].forEach(k=>localStorage.removeItem(k));
  updateStats();renderTopics();
  document.getElementById('collected-area').innerHTML='';
  showToast('削除しました');
}

// 初期化
updateStats();
renderTopics();
</script>
</body>
</html>
