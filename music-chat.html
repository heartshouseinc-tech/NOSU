<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MUSIC CHAT</title>
<style>
:root{
  --bg:#0d0b14;--bg2:#13101e;--bg3:#1a1628;
  --card:#1a1628;--bor:rgba(160,120,255,.12);--bor2:rgba(160,120,255,.25);
  --pur:#7c3aed;--pur2:#a855f7;--pur-xl:rgba(124,58,237,.12);
  --gold:#f0b830;--gold2:#d4960a;--gold-xl:rgba(240,184,48,.1);
  --grn:#10b981;--red:#ef4444;
  --txt:#f0eeff;--txt2:#a090c8;--txt3:#605080;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bor);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:900;background:linear-gradient(90deg,var(--pur2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;gap:6px;}
.nav-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-decoration:none;display:flex;align-items:center;}

/* DB状態バー */
.db-bar{background:var(--bg3);border-bottom:1px solid var(--bor);padding:6px 14px;display:flex;gap:10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.db-chip{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt3);white-space:nowrap;}
.db-chip.ok{color:var(--grn);}
.db-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);}
.db-dot.ok{background:var(--grn);}

/* チャット */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg-row{display:flex;gap:8px;align-items:flex-start;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.msg-avatar.ai{background:var(--pur-xl);border:1.5px solid var(--bor2);}
.msg-avatar.user{background:var(--gold-xl);border:1.5px solid rgba(240,184,48,.3);}
.bubble{max-width:80%;padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.8;}
.bubble.ai{background:var(--card);border:1.5px solid var(--bor2);}
.bubble.user{background:var(--pur-xl);border:1.5px solid var(--bor2);}
.bubble pre{white-space:pre-wrap;font-family:inherit;}

/* 結果カード */
.result-card{background:var(--bg2);border:2px solid var(--pur);border-radius:12px;padding:14px;margin-top:8px;}
.rc-lbl{font-size:10px;font-weight:700;color:var(--pur2);margin-bottom:6px;letter-spacing:.5px;}
.rc-style{background:var(--pur-xl);border:1.5px solid var(--bor2);border-radius:8px;padding:10px;font-size:12px;font-weight:700;color:var(--txt);line-height:1.8;margin-bottom:6px;}
.rc-lyrics{background:var(--bg3);border:1.5px solid var(--bor);border-radius:8px;padding:10px;font-size:11px;color:var(--txt2);line-height:2;white-space:pre-wrap;}
.rc-actions{display:flex;gap:6px;margin-top:8px;}

/* 選択肢ボタン */
.choices{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.choice-btn{padding:9px 14px;border-radius:10px;border:1.5px solid var(--bor2);background:var(--bg3);color:var(--txt2);font-size:12px;text-align:left;cursor:pointer;transition:.15s;}
.choice-btn:active{background:var(--pur-xl);border-color:var(--pur);}

/* 入力エリア */
.footer{background:var(--bg2);border-top:1px solid var(--bor);padding:10px 14px;flex-shrink:0;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.inp-ta{flex:1;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:20px;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;max-height:80px;line-height:1.6;}
.inp-ta:focus{border-color:var(--pur);}
.send-btn{padding:10px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--pur),var(--pur2));color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}
.quick-btns{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px;}
.quick-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor);background:var(--bg3);color:var(--txt3);font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;}

/* typing */
.typing-dots{display:flex;gap:4px;align-items:center;padding:8px;}
.td{width:6px;height:6px;border-radius:50%;background:var(--pur2);animation:tdot .8s infinite;}
.td:nth-child(2){animation-delay:.15s;}
.td:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,60%,100%{transform:scale(1);opacity:.5;}30%{transform:scale(1.4);opacity:1;}}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">💬 MUSIC CHAT</div>
    <div style="font-size:9px;color:var(--txt3);">AIと共同作曲</div>
  </div>
  <div class="nav-links">
    <a class="nav-btn" href="music-research.html">🔭</a>
    <a class="nav-btn" href="music-logic.html">📚</a>
    <a class="nav-btn" href="suno-craft.html">⚡</a>
    <button class="nav-btn" onclick="clearChat()">🗑</button>
  </div>
</div>

<!-- DB状態バー -->
<div class="db-bar" id="db-bar"></div>

<!-- チャット -->
<div class="msgs" id="msgs"></div>

<!-- 入力 -->
<div class="footer">
  <div class="quick-btns">
    <button class="quick-btn" onclick="quickSend('夜の切ない曲を作りたい')">夜の切ない曲</button>
    <button class="quick-btn" onclick="quickSend('疾走感のあるアニソンを作りたい')">疾走感アニソン</button>
    <button class="quick-btn" onclick="quickSend('おしゃれなシティポップが作りたい')">シティポップ</button>
    <button class="quick-btn" onclick="quickSend('元気が出るポップスを作りたい')">元気ポップス</button>
    <button class="quick-btn" onclick="quickSend('感動するバラードを作りたい')">感動バラード</button>
  </div>
  <div class="input-row">
    <textarea class="inp-ta" id="inp" rows="1" placeholder="作りたい曲のイメージを話してください..."
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend();}"></textarea>
    <button class="send-btn" onclick="doSend()">送</button>
  </div>
</div>

<div id="toast"></div>

<script>
const EP='https://asia-northeast1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
const KEY='HeartsHouse2026Key';

var messages=[]; // 会話履歴
var lastResult=null; // 最後に生成したStyle+歌詞

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}
function getDB(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}}
function setDB(k,d){localStorage.setItem(k,JSON.stringify(d));}

// ══ DB状態バー ══
function updateDBBar(){
  var chords=(getDB('mc_chords')||[]).length;
  var genres=(getDB('mc_genres')||[]).length;
  var research=(getDB('mc_research')||[]).length;
  var prompts=(getDB('mc_prompts')||[]).length;
  var history=(getDB('mc_history')||[]).length;
  var el=document.getElementById('db-bar');
  var items=[
    {label:'コード進行',n:chords},
    {label:'ジャンル法則',n:genres},
    {label:'Suno攻略',n:research},
    {label:'成功プロンプト',n:prompts},
    {label:'作曲履歴',n:history},
  ];
  el.innerHTML=items.map(function(i){
    return '<div class="db-chip '+(i.n>0?'ok':'')+'">'
      +'<div class="db-dot '+(i.n>0?'ok':'')+'"></div>'
      +i.label+' '+i.n+'件'
      +'</div>';
  }).join('');
}

// ══ システムプロンプト構築（全DBを注入） ══
function buildSystemPrompt(){
  var chords=getDB('mc_chords')||[];
  var genres=getDB('mc_genres')||[];
  var research=getDB('mc_research')||[];
  var prompts=getDB('mc_prompts')||[];
  var history=getDB('mc_history')||[];

  // 各DBの要約を作成（トークン節約）
  var chordsSummary=chords.slice(0,6).map(c=>
    '・'+c.name+'：'+c.body.slice(0,80)
  ).join('\n');

  var genresSummary=genres.slice(0,4).map(g=>
    '【'+g.name+'】\n'+g.body.slice(0,120)
  ).join('\n');

  var researchSummary=research.slice(0,4).map(r=>
    '【'+r.cat+'：'+r.name+'】\n'+r.content.slice(0,100)
  ).join('\n');

  var promptsSummary=prompts.slice(-5).map(p=>
    '「'+p.name+'」：'+p.body.slice(0,80)
  ).join('\n');

  var historySummary=history.slice(-5).map(h=>
    h.title+'（'+h.date+'）：'+h.style.slice(0,60)
  ).join('\n');

  return `あなたはSuno AI専門の音楽プロデューサーAIです。
ユーザーと対話しながら曲を共同制作します。

━━━ あなたが持っている知識 ━━━

【コード進行DB（${chords.length}件）】
${chordsSummary||'（データなし：music-logic.htmlで追加してください）'}

【ジャンル別法則DB（${genres.length}件）】
${genresSummary||'（データなし）'}

【Suno攻略情報（${research.length}件収集済）】
${researchSummary||'（データなし：music-research.htmlで収集してください）'}

【成功プロンプト集（${prompts.length}件）】
${promptsSummary||'（データなし）'}

【このユーザーの作曲履歴（${history.length}件）】
${historySummary||'（まだ作曲履歴がありません）'}

━━━ 対話ルール ━━━
1. 一度に聞くことは1つだけ。選択肢を2〜3個提示する
2. DB内の成功事例を積極的に参照する
3. 会話が5往復を超えたらStyleと歌詞を提案する
4. Styleは英語・120文字以内・アーティスト名禁止
5. 歌詞は必ず日本語・Sunoメタタグ付き（[Chorus]等）
6. 完成時は「=STYLE=」「=LYRICS=」タグで出力する

━━━ 完成時の出力形式 ━━━
=STYLE=
（英語のSuno Style・120文字以内）
=LYRICS=
（日本語歌詞・メタタグ付き）
=TIPS=
（このプロンプトでSunoを使うコツ・1〜2行）`;
}

// ══ メッセージ追加 ══
function addMsg(role,content,extra){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row '+(role==='user'?'user':'');
  var avatar=document.createElement('div');
  avatar.className='msg-avatar '+(role==='user'?'user':'ai');
  avatar.textContent=role==='user'?'🎵':'🎹';
  var bubble=document.createElement('div');
  bubble.className='bubble '+(role==='user'?'user':'ai');

  // Style+歌詞の結果カードを生成
  if(extra&&extra.style){
    bubble.innerHTML='<div>'+esc(extra.comment)+'</div>';
    var card=buildResultCard(extra.style,extra.lyrics,extra.tips);
    bubble.appendChild(card);
  } else {
    // 通常テキスト（選択肢ボタンを生成）
    var parts=content.split(/\n(・[^\n]+)/g);
    bubble.innerHTML='<pre>'+esc(content)+'</pre>';
    // 選択肢検出
    if(extra&&extra.choices){
      var choiceDiv=document.createElement('div');
      choiceDiv.className='choices';
      extra.choices.forEach(function(c){
        var btn=document.createElement('button');
        btn.className='choice-btn';
        btn.textContent=c;
        btn.onclick=function(){sendMsg(c);};
        choiceDiv.appendChild(btn);
      });
      bubble.appendChild(choiceDiv);
    }
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  el.appendChild(row);
  el.scrollTop=el.scrollHeight;
  return row;
}

function buildResultCard(style,lyrics,tips){
  var card=document.createElement('div');
  card.className='result-card';
  var len=style.length;
  var col=len>120?'#ef4444':len>100?'var(--gold)':'var(--grn)';
  card.innerHTML=
    '<div class="rc-lbl">🎨 Suno Style</div>'
    +'<div class="rc-style">'+esc(style)+'<span style="font-size:10px;color:'+col+';margin-left:6px;">('+len+'/120文字)</span></div>'
    +'<div class="rc-lbl" style="margin-top:8px;">📝 歌詞（日本語）</div>'
    +'<div class="rc-lyrics">'+esc(lyrics)+'</div>'
    +(tips?'<div style="font-size:10px;color:var(--txt3);margin-top:8px;line-height:1.6;">💡 '+esc(tips)+'</div>':'')
    +'<div class="rc-actions">'
    +'<button class="nav-btn" onclick="copyStyle(\''+esc(style)+'\')" style="color:var(--pur2);">📋 Style</button>'
    +'<button class="nav-btn" onclick="copyLyrics(\''+esc(lyrics)+'\')" style="color:var(--gold);">📋 歌詞</button>'
    +'<button class="nav-btn" onclick="sendToSunoCraft(\''+esc(style)+'\')" style="color:var(--grn);">⚡ Sunoへ</button>'
    +'<button class="nav-btn" onclick="saveResult(\''+esc(style)+'\')" style="color:var(--txt2);">💾 保存</button>'
    +'</div>';
  lastResult={style,lyrics,tips};
  return card;
}

function addTyping(){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row';row.id='typing-row';
  row.innerHTML='<div class="msg-avatar ai">🎹</div><div class="bubble ai"><div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  el.appendChild(row);
  el.scrollTop=el.scrollHeight;
}
function removeTyping(){var r=document.getElementById('typing-row');if(r)r.remove();}

// ══ 送信 ══
function doSend(){
  var inp=document.getElementById('inp');
  var text=inp.value.trim();
  if(!text) return;
  inp.value='';
  inp.style.height='auto';
  sendMsg(text);
}

function quickSend(text){sendMsg(text);}

async function sendMsg(text){
  addMsg('user',text);
  messages.push({role:'user',content:text});
  addTyping();

  var sys=buildSystemPrompt();
  var history=messages.slice(-8).map(m=>(m.role==='user'?'ユーザー：':'AI：')+m.content).join('\n');
  var prompt=sys+'\n\n━━━ 会話履歴 ━━━\n'+history+'\n\nユーザー：'+text+'\n\nAI：';

  try{
    var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','x-access-key':KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',mode:'normal',prompt:prompt,useSearch:false,useCache:false})});
    var d=await r.json().catch(()=>({}));
    var reply=d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'エラーが発生しました';
    removeTyping();
    messages.push({role:'assistant',content:reply});

    // Style/歌詞を検出
    var styleMatch=reply.match(/=STYLE=\s*([\s\S]*?)(?==LYRICS=|$)/);
    var lyricsMatch=reply.match(/=LYRICS=\s*([\s\S]*?)(?==TIPS=|$)/);
    var tipsMatch=reply.match(/=TIPS=\s*([\s\S]*?)$/);

    if(styleMatch&&lyricsMatch){
      var style=styleMatch[1].trim();
      var lyrics=lyricsMatch[1].trim();
      var tips=tipsMatch?tipsMatch[1].trim():'';
      var comment=reply.split('=STYLE=')[0].trim();
      addMsg('ai',comment,{style,lyrics,tips,comment});
    } else {
      // 選択肢を抽出
      var choices=[];
      var choiceReg=/[①②③A-C][\.\)）]\s*(.+)/g;
      var cm;
      while((cm=choiceReg.exec(reply))!==null&&choices.length<3) choices.push(cm[1].trim());
      addMsg('ai',reply,choices.length?{choices}:null);
    }
  }catch(e){
    removeTyping();
    addMsg('ai','エラーが発生しました: '+e.message);
  }
  updateDBBar();
}

// ══ アクション ══
function copyStyle(s){
  var dec=s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  if(navigator.clipboard) navigator.clipboard.writeText(dec).then(()=>showToast('📋 StyleをコピーしまSした'));
}
function copyLyrics(l){
  var dec=l.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  if(navigator.clipboard) navigator.clipboard.writeText(dec).then(()=>showToast('📋 歌詞をコピーしました'));
}
function sendToSunoCraft(s){
  var dec=s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  localStorage.setItem('mc_pending_style',dec);
  window.location.href='suno-craft.html?from=chat';
}
function saveResult(s){
  if(!lastResult) return;
  var title=prompt('この曲のタイトルを入力：','無題'+new Date().toLocaleDateString('ja-JP'));
  if(!title) return;
  var history=getDB('mc_history')||[];
  var item={
    id:'h_'+Date.now(),
    title:title,
    style:lastResult.style,
    lyrics:lastResult.lyrics,
    date:new Date().toLocaleString('ja-JP')
  };
  history.push(item);
  setDB('mc_history',history);
  // 成功プロンプトにも追加
  var prompts=getDB('mc_prompts')||[];
  prompts.push({id:'h_'+Date.now(),name:title,body:lastResult.style,tags:['チャット生成'],addedAt:item.date});
  setDB('mc_prompts',prompts);
  showToast('💾 「'+title+'」を保存しました');
  updateDBBar();
}

function clearChat(){
  if(!confirm('会話をリセットしますか？'))return;
  messages=[];lastResult=null;
  document.getElementById('msgs').innerHTML='';
  initChat();
}

// 初期メッセージ
function initChat(){
  var chords=(getDB('mc_chords')||[]).length;
  var research=(getDB('mc_research')||[]).length;
  var history=(getDB('mc_history')||[]).length;
  var dbReady=chords>0||research>0;

  var msg=dbReady
    ? '🎹 こんにちは！共同作曲AIです。\n\n'
      +'データベースの状態：\n'
      +'・コード進行 '+chords+'件\n'
      +'・収集データ '+research+'件\n'
      +'・作曲履歴 '+history+'件\n\n'
      +'これだけ知識があれば、かなり精度の高い曲が作れます！\n\n'
      +'どんな曲を作りたいですか？\n'
      +'例：「夜の切ない女性ボーカル曲」「疾走感のあるアニソン」など\n'
      +'何でも話しかけてください。'
    : '🎹 こんにちは！共同作曲AIです。\n\n'
      +'⚠️ まだデータベースが空です。\n\n'
      +'より精度を上げるには：\n'
      +'1. 🔭 RESEARCH で音楽理論を自動収集\n'
      +'2. 📚 LOGIC でコード進行を確認\n\n'
      +'今すぐでも作曲できます！\nどんな曲を作りたいですか？';

  addMsg('ai',msg);
  messages.push({role:'assistant',content:msg});
}

// URLパラメータ受け取り（suno-craftからの戻り）
var params=new URLSearchParams(location.search);
if(params.get('from')==='craft'){
  showToast('⚡ Sunoプロンプトを受け取りました');
}

updateDBBar();
initChat();
</script>
</body>
</html>
